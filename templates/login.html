<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Report Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --bg-1: #141414;
            --bg-2: #1c1c1c;
            --text: #e8e3dc;
            --text-2: #a09890;
            --text-3: #5c5550;
            --primary: #f0a843;
            --green: #52b788;
            --red: #e05252;
        }

        body.light-theme {
            --bg: #f5f2ee;
            --bg-1: #eeebe6;
            --bg-2: #e8e4de;
            --text: #1a1714;
            --text-2: #5a5450;
            --text-3: #9a9490;
            --primary: #b8680a;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Geist Mono', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .login-container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
        }

        .login-card {
            background: var(--bg-1);
            border: 1px solid var(--bg-2);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #f5b85a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            font-weight: 800;
            color: #0d0d0d;
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-3);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--bg-2);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .form-input::placeholder {
            color: var(--text-3);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(240, 168, 67, 0.1);
        }

        .form-input-group {
            position: relative;
        }

        .form-input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 16px;
            pointer-events: none;
        }

        .form-input-icon-left {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 16px;
            pointer-events: none;
        }

        .form-input.with-icon-left {
            padding-left: 40px;
        }

        .form-input.with-icon-right {
            padding-right: 40px;
        }

        .error-message {
            color: var(--red);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-danger {
            background: rgba(224, 82, 82, 0.1);
            border-color: var(--red);
            color: var(--red);
        }

        .alert-success {
            background: rgba(82, 183, 136, 0.1);
            border-color: var(--green);
            color: var(--green);
        }

        .alert i {
            font-size: 14px;
            flex-shrink: 0;
        }

        .login-button {
            width: 100%;
            padding: 11px 16px;
            background: var(--primary);
            color: #0d0d0d;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .login-button:hover {
            background: #f5b85a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(240, 168, 67, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-button.loading {
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(13, 13, 13, 0.3);
            border-top-color: #0d0d0d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-3);
        }

        .login-footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .login-footer-link:hover {
            color: #f5b85a;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-3);
            font-size: 11px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--bg-2);
        }

        .divider span {
            padding: 0 12px;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border: 1px solid var(--bg-2);
            background: transparent;
            color: var(--text-2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 100;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(240, 168, 67, 0.1);
        }

        .logo-mini {
            position: fixed;
            top: 20px;
            left: 20px;
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px;
            }

            .login-logo {
                width: 56px;
                height: 56px;
                font-size: 28px;
            }

            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- ЛОГОТИП -->
    <div class="logo-mini">NL</div>

    <!-- ПЕРЕКЛЮЧАТЕЛЬ ТЕМЫ -->
    <button class="theme-toggle" id="themeToggle" title="Переключить тему">
        <i class="bi bi-sun"></i>
    </button>

    <!-- ГЛАВНЫЙ КОНТЕЙНЕР -->
    <div class="login-container">
        <div class="login-card">
            <!-- ЗАГОЛОВОК -->
            <div class="login-header">
                <div class="login-logo">🔐</div>
                <div class="login-title">Report Builder</div>
                <div class="login-subtitle">Вход в систему</div>
            </div>

            <!-- УВЕДОМЛЕНИЕ ОБ ОШИБКЕ -->
            {% if error %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- ФОРМА -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- ИМЕНА ПОЛЬЗОВАТЕЛЯ -->
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="bi bi-person"></i> Имя пользователя или Email
                    </label>
                    <div class="form-input-group">
                        <i class="form-input-icon-left bi bi-person-fill"></i>
                        <input
                            type="text"
                            id="username"
                            class="form-input with-icon-left"
                            placeholder="admin"
                            required
                            autocomplete="username"
                        />
                    </div>
                    <div class="error-message" data-field="username"></div>
                </div>

                <!-- ПАРОЛЬ -->
                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="bi bi-lock"></i> Пароль
                    </label>
                    <div class="form-input-group">
                        <i class="form-input-icon-left bi bi-lock-fill"></i>
                        <input
                            type="password"
                            id="password"
                            class="form-input with-icon-left"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        />
                    </div>
                    <div class="error-message" data-field="password"></div>
                </div>

                <!-- КНОПКА ВХОДА -->
                <button type="submit" class="login-button">
                    <span id="buttonText"><i class="bi bi-arrow-right"></i> Войти</span>
                </button>
            </form>

            <!-- РАЗДЕЛИТЕЛЬ -->
            <div class="divider">
                <span>или</span>
            </div>

            <!-- ССЫЛКА НА РЕГИСТРАЦИЮ -->
            <div class="login-footer">
                Нет аккаунта?
                <a href="{{ url_for('register') }}" class="login-footer-link">
                    Создать новый →
                </a>
            </div>

            <!-- ИНФОРМАЦИЯ -->
            <div class="login-footer" style="margin-top: 28px; font-size: 11px; opacity: 0.6;">
                <i class="bi bi-shield-check"></i> Защищённое соединение
                <br>
                Report Builder v1.18
            </div>
        </div>
    </div>

    <script>
        // Тема
        (function() {
            const toggle = document.getElementById('themeToggle');
            const saved = localStorage.getItem('theme') || 'dark';
            
            function applyTheme(t) {
                if (t === 'light') {
                    document.body.classList.add('light-theme');
                    toggle.innerHTML = '<i class="bi bi-moon"></i>';
                } else {
                    document.body.classList.remove('light-theme');
                    toggle.innerHTML = '<i class="bi bi-sun"></i>';
                }
            }
            
            applyTheme(saved);
            toggle.addEventListener('click', () => {
                const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
                localStorage.setItem('theme', next);
                applyTheme(next);
            });
        })();

        // Обработка формы
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const button = e.target.querySelector('button[type="submit"]');
            const buttonText = document.getElementById('buttonText');
            
            // Валидация
            if (!username) {
                showError('username', 'Укажите имя пользователя');
                return;
            }
            
            if (!password) {
                showError('password', 'Укажите пароль');
                return;
            }
            
            clearErrors();
            
            // Отправляем
            button.disabled = true;
            buttonText.innerHTML = '<span class="spinner"></span> Вход...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Успех - переходим на dashboard
                    window.location.href = data.redirect || '/dashboard';
                } else {
                    // Ошибка
                    showAlert(data.error || 'Ошибка входа', 'danger');
                    button.disabled = false;
                    buttonText.innerHTML = '<i class="bi bi-arrow-right"></i> Войти';
                }
            } catch (error) {
                showAlert('Ошибка подключения: ' + error.message, 'danger');
                button.disabled = false;
                buttonText.innerHTML = '<i class="bi bi-arrow-right"></i> Войти';
            }
        }

        function showError(field, message) {
            const errorEl = document.querySelector(`.error-message[data-field="${field}"]`);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
                el.classList.remove('show');
            });
        }

        function showAlert(message, type) {
            // Удаляем старое уведомление если есть
            const oldAlert = document.querySelector('.alert');
            if (oldAlert) oldAlert.remove();
            
            const card = document.querySelector('.login-card');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <i class="bi bi-${type === 'danger' ? 'exclamation-circle' : 'check-circle'}"></i>
                ${escapeHtml(message)}
            `;
            card.insertBefore(alert, card.firstChild);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Очистка ошибок при вводе
        document.getElementById('username').addEventListener('input', clearErrors);
        document.getElementById('password').addEventListener('input', clearErrors);
    </script>
</body>
</html>
