{% extends "base.html" %}

{% block title %}404 — Страница не найдена{% endblock %}

{% block topbar_title %}Страница не найдена{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;">
    <i class="bi bi-exclamation-circle" style="font-size:64px;color:var(--text-3);margin-bottom:24px;"></i>
    <h2 style="font-size:24px;margin-bottom:8px;color:var(--text);">404 — Страница не найдена</h2>
    <p style="color:var(--text-3);margin-bottom:24px;">Запрошенная страница не существует или была перемещена.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-sm">
        <i class="bi bi-house"></i> На главную
    </a>
</div>
{% endblock %}
