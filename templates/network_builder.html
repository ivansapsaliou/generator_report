<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор сети - Report Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
    
    <style>
        #network-container {
            width: 100%;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            margin-top: 12px;
        }
        
        #network-sidebar {
            min-width: 300px;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            max-height: 600px;
            color: var(--text);
        }
        
        .network-layout {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        
        .node-info {
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text);
        }
        
        .node-info strong {
            display: block;
            margin-bottom: 4px;
            color: var(--primary);
        }
        
        .network-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stat-item {
            background: var(--bg);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }
        
        h5, h6 {
            color: var(--text);
        }
        
        .form-label {
            color: var(--text);
        }
        
        .form-control {
            background: var(--bg);
            color: var(--text);
            border-color: var(--border);
        }
        
        .form-control:focus {
            background: var(--bg);
            color: var(--text);
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
        
        .filter-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-item label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .filter-item select,
        .filter-item input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }
        
        .filter-item select:disabled,
        .filter-item input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .filter-input-wrapper {
            position: relative;
        }
        
        .filter-input-wrapper .search-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        
        .filter-mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        
        .filter-mode-toggle label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
        }
        
        .accounting-month-selector {
            display: none;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        
        .accounting-month-selector.visible {
            display: block !important;
        }
        
        .accounting-month-selector label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .accounting-month-selector input[type="month"] {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }
        
        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }
        
        /* Grid background pattern for network container */
        #network-container {
            position: relative;
        }
        
        #network-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--grid-color, rgba(255,255,255,0.05)) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color, rgba(255,255,255,0.05)) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
            border-radius: 8px;
        }
        
        .light-theme #network-container::before {
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
        
        #network-container .vis-network {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
<div class="main-container">

    <!-- SIDEBAR (скопировано из base.html) -->
    <aside class="sidebar">
        <a href="{{ url_for('index') }}" class="sidebar-brand" title="Главная">NL</a>
        <nav class="sidebar-nav">
            <a href="{{ url_for('index') }}"
               class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}"
               title="Отчёты">
                <i class="bi bi-bar-chart-line"></i>
            </a>
            <a href="{{ url_for('scheduled_reports') }}"
               class="sidebar-link {% if request.endpoint == 'scheduled_reports' %}active{% endif %}"
               title="Запланированные отчёты">
                <i class="bi bi-clock"></i>
            </a>
            <a href="{{ url_for('monitoring') }}"
               class="sidebar-link {% if request.endpoint == 'monitoring' %}active{% endif %}"
               title="Мониторинг">
                <i class="bi bi-activity"></i>
            </a>
            <a href="{{ url_for('settings') }}"
               class="sidebar-link {% if request.endpoint == 'settings' %}active{% endif %}"
               title="Настройки">
                <i class="bi bi-gear"></i>
            </a>
            <a href="{{ url_for('network_builder') }}"
               class="sidebar-link {% if request.endpoint == 'network_builder' %}active{% endif %}"
               title="Конструктор сети">
                <i class="bi bi-diagram-3"></i>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="themeToggle" class="theme-toggle" title="Переключить тему">
                <i class="bi bi-sun"></i>
            </button>
        </div>
    </aside>

    <!-- CONTENT -->
    <div class="content-wrapper">
        <div class="top-bar">
            <h1>
                <i class="bi bi-diagram-3"></i>
                Конструктор сети водоснабжения
            </h1>
            <div class="top-actions">
                <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">
                    <i class="bi bi-house"></i> Главная
                </a>
            </div>
        </div>

        <div class="content">
            <!-- Переключатель режимов -->
            <div class="filter-mode-toggle">
                <label>
                    <input type="radio" name="buildMode" value="standard" checked onchange="onBuildModeChange()">
                    Стандартный режим
                </label>
                <label>
                    <input type="radio" name="buildMode" value="accounting" onchange="onBuildModeChange()">
                    Использовать способ учета
                </label>
            </div>

            <!-- Селектор месяца для режима учета -->
            <div id="accountingMonthSelector" class="accounting-month-selector">
                <label>Выберите месяц для построения:</label>
                <input type="month" id="accountingMonth" onchange="onAccountingMonthChange()">
            </div>

            <!-- Каскадные фильтры -->
            <div class="filter-group">
                <div class="filter-item">
                    <label>Объект</label>
                    <div class="filter-input-wrapper">
                        <select id="objectSelect" onchange="onObjectChange()">
                            <option value="">Выберите объект...</option>
                        </select>
                    </div>
                    <input type="text" id="objectSearch" placeholder="Поиск..." style="margin-top: 4px;" oninput="filterSelect('objectSelect', this.value)">
                </div>
                <div class="filter-item">
                    <label>Узел</label>
                    <select id="nodeSelect" onchange="onNodeChange()" disabled>
                        <option value="">Сначала выберите объект</option>
                    </select>
                    <input type="text" id="nodeSearch" placeholder="Поиск..." style="margin-top: 4px;" oninput="filterSelect('nodeSelect', this.value)" disabled>
                </div>
                <div class="filter-item">
                    <label>Расчетный параметр (Node ID)</label>
                    <select id="parameterSelect" onchange="onParameterChange()" disabled>
                        <option value="">Сначала выберите узел</option>
                    </select>
                    <input type="text" id="parameterSearch" placeholder="Поиск..." style="margin-top: 4px;" oninput="filterSelect('parameterSelect', this.value)" disabled>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" onclick="loadNetwork()">
                        <i class="bi bi-arrow-repeat"></i> Загрузить сеть
                    </button>
                    <button class="btn btn-secondary" onclick="exportNetwork()">
                        <i class="bi bi-download"></i> Экспорт CSV
                    </button>
                </div>
            </div>

            <!-- Основной контейнер -->
            <div class="network-layout">
                <!-- Граф сети -->
                <div style="flex: 1;">
                    <div id="network-container"></div>
                </div>

                <!-- Информация о сети -->
                <div id="network-sidebar">
                    <h5><i class="bi bi-info-circle"></i> Информация о сети</h5>
                    <div class="network-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="nodeCount">0</div>
                            <div>Узлов</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="lineCount">0</div>
                            <div>Линий</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="maxLevel">0</div>
                            <div>Уровней</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="edgeCount">0</div>
                            <div>Связей</div>
                        </div>
                    </div>

                    <h6 style="margin-top: 16px;">Типы узлов (легенда)</h6>
                    <div id="typeLegend" style="margin-bottom: 12px;"></div>

                    <h6 style="margin-top: 16px;">Выбранный элемент</h6>
                    <div id="nodeDetails" style="color: var(--text-muted); font-size: 12px;">
                        Выберите узел на графе для отображения информации
                    </div>

                    <div style="margin-top: 16px;">
                        <label style="font-size: 12px; color: var(--text);">
                            <input type="checkbox" id="showLabels" checked onchange="updateNetworkOptions()">
                            Показывать метки
                        </label>
                        <br>
                        <label style="font-size: 12px; color: var(--text);">
                            <input type="checkbox" id="showPhysics" onchange="updateNetworkOptions()">
                            Физическое моделирование
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// GLOBAL VARIABLES
// ═════════════════════════════════════════════════════════════════════════════
let network;
let nodesData = [];
let edgesData = [];
let rawData = [];
let nodeTypeColors = {};
let accountingData = {}; // node_calculate_parameter_id -> accounting types
let currentBuildMode = 'standard';
let selectedAccountingMonth = null;

// ═════════════════════════════════════════════════════════════════════════════
// THEME MANAGEMENT - Управление темой
// ═════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
    const themeToggle = document.getElementById('themeToggle');
    
    // Функция применения темы (как в login.html)
    function applyTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light-theme');
            themeToggle.innerHTML = '<i class="bi bi-moon"></i>';
        } else {
            document.body.classList.remove('light-theme');
            themeToggle.innerHTML = '<i class="bi bi-sun"></i>';
        }
    }
        
    // Получаем сохраненную тему (по умолчанию 'dark')
    const savedTheme = localStorage.getItem('theme') || 'dark';
    applyTheme(savedTheme);
    
    // Обработчик клика по кнопке переключения
    themeToggle.addEventListener('click', function() {
        const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
        
        // Перестраиваем граф при смене темы
        if (rawData.length > 0) {
            buildNetworkGraph(rawData);
        }
    });
    
    // Загружаем список объектов при загрузке страницы
    loadObjects();
    
    // Устанавливаем текущий месяц по умолчанию
    const now = new Date();
    const monthStr = now.toISOString().slice(0, 7);
    document.getElementById('accountingMonth').value = monthStr;
});

// ═════════════════════════════════════════════════════════════════════════════
// CASCADE FILTERS - Каскадные фильтры
// ═════════════════════════════════════════════════════════════════════════════

async function loadObjects() {
    try {
        console.log('[NETWORK] Loading objects...');
        const response = await fetch('/api/network/objects');
        console.log('[NETWORK] Response status:', response.status);
        
        if (!response.ok) {
            console.error('[NETWORK] HTTP error:', response.status);
            return;
        }
        
        const data = await response.json();
        console.log('[NETWORK] Objects loaded:', data);
        
        if (!data.success) {
            console.error('Error loading objects:', data.error);
            return;
        }
        
        const select = document.getElementById('objectSelect');
        select.innerHTML = '<option value="">Выберите объект...</option>';
        
        data.data.forEach(obj => {
            const option = document.createElement('option');
            option.value = obj.object_id;
            option.textContent = obj.object_name;
            select.appendChild(option);
        });
        
        console.log('[NETWORK] Objects count:', data.data.length);
        
    } catch (error) {
        console.error('[NETWORK] Error loading objects:', error);
    }
}

async function onObjectChange() {
    const objectId = document.getElementById('objectSelect').value;
    const nodeSelect = document.getElementById('nodeSelect');
    const parameterSelect = document.getElementById('parameterSelect');
    const nodeSearch = document.getElementById('nodeSearch');
    const parameterSearch = document.getElementById('parameterSearch');
    
    // Сброс всех зависимых фильтров
    nodeSelect.innerHTML = '<option value="">Сначала выберите объект</option>';
    nodeSelect.disabled = true;
    nodeSearch.disabled = true;
    nodeSearch.value = '';
    
    parameterSelect.innerHTML = '<option value="">Сначала выберите узел</option>';
    parameterSelect.disabled = true;
    parameterSearch.disabled = true;
    parameterSearch.value = '';
    
    if (!objectId) return;
    
    try {
        const response = await fetch(`/api/network/nodes?object_id=${objectId}`);
        const data = await response.json();
        
        if (!data.success) {
            console.error('Error loading nodes:', data.error);
            return;
        }
        
        nodeSelect.innerHTML = '<option value="">Выберите узел...</option>';
        
        data.data.forEach(node => {
            const option = document.createElement('option');
            option.value = node.node_id;
            option.textContent = node.node_name || `Node ${node.node_id}`;
            nodeSelect.appendChild(option);
        });
        
        nodeSelect.disabled = false;
        nodeSearch.disabled = false;
        
    } catch (error) {
        console.error('Error loading nodes:', error);
    }
}

async function onNodeChange() {
    const nodeId = document.getElementById('nodeSelect').value;
    const parameterSelect = document.getElementById('parameterSelect');
    const parameterSearch = document.getElementById('parameterSearch');
    
    // Сброс зависимого фильтра
    parameterSelect.innerHTML = '<option value="">Сначала выберите узел</option>';
    parameterSelect.disabled = true;
    parameterSearch.disabled = true;
    parameterSearch.value = '';
    
    if (!nodeId) return;
    
    try {
        const response = await fetch(`/api/network/parameters?node_id=${nodeId}`);
        const data = await response.json();
        
        if (!data.success) {
            console.error('Error loading parameters:', data.error);
            return;
        }
        
        parameterSelect.innerHTML = '<option value="">Выберите параметр...</option>';
        
        data.data.forEach(param => {
            const option = document.createElement('option');
            option.value = param.node_calculate_parameter_id;
            option.textContent = param.parameter_name;
            parameterSelect.appendChild(option);
        });
        
        parameterSelect.disabled = false;
        parameterSearch.disabled = false;
        
    } catch (error) {
        console.error('Error loading parameters:', error);
    }
}

function onParameterChange() {
    const paramId = document.getElementById('parameterSelect').value;
    // Можно добавить дополнительную логику при выборе параметра
    console.log('Selected parameter ID:', paramId);
}

// ═════════════════════════════════════════════════════════════════════════════
// FILTER FUNCTIONS - Функции фильтрации
// ═════════════════════════════════════════════════════════════════════════════

function filterSelect(selectId, searchText) {
    const select = document.getElementById(selectId);
    const search = searchText.toLowerCase();
    
    for (let i = 0; i < select.options.length; i++) {
        const option = select.options[i];
        const text = option.text.toLowerCase();
        option.style.display = text.includes(search) ? '' : 'none';
    }
}

function onBuildModeChange() {
    const mode = document.querySelector('input[name="buildMode"]:checked').value;
    currentBuildMode = mode;
    console.log('[NETWORK] Build mode changed to:', mode);
    
    const monthSelector = document.getElementById('accountingMonthSelector');
    console.log('[NETWORK] Month selector element:', monthSelector);
    console.log('[NETWORK] Current classes:', monthSelector.className);
    
    if (mode === 'accounting') {
        monthSelector.classList.add('visible');
    } else {
        monthSelector.classList.remove('visible');
    }
    
    console.log('[NETWORK] New classes:', monthSelector.className);
    
    // Сбрасываем данные
    rawData = [];
    accountingData = {};
    if (network) {
        network.destroy();
        network = null;
    }
    document.getElementById('nodeCount').textContent = '0';
    document.getElementById('lineCount').textContent = '0';
    document.getElementById('maxLevel').textContent = '0';
    document.getElementById('edgeCount').textContent = '0';
    document.getElementById('typeLegend').innerHTML = '';
}

function onAccountingMonthChange() {
    const monthInput = document.getElementById('accountingMonth').value;
    if (monthInput) {
        selectedAccountingMonth = monthInput; // format: YYYY-MM
    } else {
        selectedAccountingMonth = null;
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// NETWORK BUILDER - Конструктор сети
// ═════════════════════════════════════════════════════════════════════════════

async function loadNetwork() {
    // Получаем root_node_id из выпадающего списка
    const rootNodeId = document.getElementById('parameterSelect').value;
    
    if (!rootNodeId || rootNodeId <= 0) {
        alert('Пожалуйста, выберите расчетный параметр');
        return;
    }
    
    // Если выбран режим "Использовать способ учета", проверяем месяц
    if (currentBuildMode === 'accounting') {
        if (!selectedAccountingMonth) {
            alert('Пожалуйста, выберите месяц для построения');
            return;
        }
    }
        
    try {
        console.log(`[NETWORK] Loading network tree for node ${rootNodeId}, mode: ${currentBuildMode}`);
        
        let url = `/api/network/tree?root_node_id=${rootNodeId}`;
        
        // Добавляем параметры для режима с способами учета
        if (currentBuildMode === 'accounting' && selectedAccountingMonth) {
            url += `&accounting_month=${selectedAccountingMonth}&use_accounting=true`;
        }
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data.success) {
            alert('Ошибка: ' + (data.error || 'Unknown error'));
            return;
        }
        
        rawData = data.data;
        
        // Сохраняем данные о способах учета, если они есть
        if (data.accounting_data) {
            accountingData = data.accounting_data;
            console.log(`[NETWORK] ✅ Loaded accounting data for ${Object.keys(accountingData).length} nodes`);
        }
        
        buildNetworkGraph(data.data);
        updateNetworkStats();
        updateTypeLegend();
        console.log(`[NETWORK] ✅ Network loaded successfully with ${data.data.length} nodes`);
        
    } catch (error) {
        console.error('Error loading network:', error);
        alert('Ошибка при загрузке сети: ' + error.message);
    }
}

function buildNetworkGraph(treeData) {
    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();
    
    const nodeMap = new Map(); // node_id -> vis node id
    
    // Цвета для типов узлов
    const typeColorPalette = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#A8E6CF',
        '#E74C3C', '#3498DB', '#9B59B6', '#1ABC9C', '#F39C12'
    ];
    
    // Определяем цвета в зависимости от темы
    const isDark = !document.body.classList.contains('light-theme');
    const edgeColor = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
    const fontColor = isDark ? '#ffffff' : '#000000';
    const borderColor = isDark ? '#666666' : '#333333';
    const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    
    // Собираем уникальные типы узлов
    const uniqueTypes = new Set();
    treeData.forEach(item => {
        if (item.node_type_name) {
            uniqueTypes.add(item.node_type_name);
        }
    });
    
    // Назначаем цвета типам
    nodeTypeColors = {};
    let colorIndex = 0;
    uniqueTypes.forEach(type => {
        nodeTypeColors[type] = typeColorPalette[colorIndex % typeColorPalette.length];
        colorIndex++;
    });
    
    // Добавляем корневой узел
    const rootNode = treeData[0];
    if (!rootNode) {
        console.warn('[NETWORK] No data received');
        return;
    }
    
    const rootVisId = `node-${rootNode.node_calculate_parameter_id || rootNode.node_id}`;
    nodeMap.set(rootNode.node_calculate_parameter_id || rootNode.node_id, rootVisId);
    
    // Функция для получения отображаемого имени узла
    const getNodeLabel = (node) => {
        if (!document.getElementById('showLabels').checked) return '';
        const name = node.node_name || `Node ${node.node_calculate_parameter_id || node.node_id}`;
        return name.length > 20 ? name.substring(0, 17) + '...' : name;
    };
    
    // Функция для получения tooltip с информацией об узле
    const getNodeTitle = (node, nodeId) => {
        let html = `<strong>Node ID:</strong> ${nodeId}<br>`;
        html += `<strong>Name:</strong> ${node.node_name || 'N/A'}<br>`;
        html += `<strong>Line:</strong> ${node.line_name || 'N/A'}<br>`;
        html += `<strong>Type:</strong> ${node.node_type_name || 'N/A'}<br>`;
        html += `<strong>Level:</strong> ${node.level}<br>`;
        
        // Добавляем информацию о способах учета в режиме accounting
        if (currentBuildMode === 'accounting' && accountingData[nodeId]) {
            const accInfo = accountingData[nodeId];
            if (accInfo.types && accInfo.types.length > 0) {
                html += `<br><strong>Способы учета:</strong><br>`;
                accInfo.types.forEach(t => {
                    html += `<span style="color: #4ECDC4;">• ${t}</span><br>`;
                });
            }
        }
        
        return html;
    };
    
    // Получаем цвет для узла по его типу
    const getNodeColor = (node) => {
        const typeName = node.node_type_name;
        if (typeName && nodeTypeColors[typeName]) {
            return nodeTypeColors[typeName];
        }
        // Для корневого узла без типа - специальный цвет
        return '#FF6B6B';
    };
    
    nodes.add({
        id: rootVisId,
        label: getNodeLabel(rootNode),
        title: getNodeTitle(rootNode, rootNode.node_calculate_parameter_id || rootNode.node_id),
        level: 0,
        color: {
            background: getNodeColor(rootNode),
            border: borderColor,
            highlight: {
                background: '#FF6B6B',
                border: borderColor
            }
        },
        shape: 'dot',
        size: 30,
        font: {
            size: 14,
            color: fontColor,
            bold: {
                color: fontColor
            }
        },
        x: 0,
        y: 0
    });
    
    // Обрабатываем остальные узлы
    treeData.forEach(item => {
        if (item.level === 0) return; // Пропускаем корень
        
        const nodeId = item.child_id || item.node_calculate_parameter_id;
        const visId = `node-${nodeId}`;
        
        if (!nodeMap.has(nodeId)) {
            nodeMap.set(nodeId, visId);
            
            const color = getNodeColor(item);
            // Вычисляем начальные координаты на основе level (для начального размещения)
            const xOffset = (item.level - 1) * 150;
            const yOffset = (Math.random() - 0.5) * 200;
            
            nodes.add({
                id: visId,
                label: getNodeLabel(item),
                title: getNodeTitle(item, nodeId),
                level: item.level,
                color: {
                    background: color,
                    border: borderColor,
                    highlight: {
                        background: '#FF6B6B',
                        border: borderColor
                    }
                },
                shape: 'dot',
                size: 25 - (item.level * 2),
                font: {
                    size: 12,
                    color: fontColor,
                    bold: {
                        color: fontColor
                    }
                },
                x: xOffset + (Math.random() - 0.5) * 50,
                y: yOffset
            });
        }
    });
    
    // Добавляем связи между узлами
    const processedEdges = new Set();
    treeData.forEach(item => {
        if (item.level === 0) return;
        
        const fromNodeId = item.node_calculate_parameter_id || item.node_id;
        const toNodeId = item.child_id || item.node_calculate_parameter_id;
        
        const fromId = `node-${fromNodeId}`;
        const toId = `node-${toNodeId}`;
        const edgeKey = `${fromId}-${toId}`;
        
        if (!processedEdges.has(edgeKey)) {
            processedEdges.add(edgeKey);
            edges.add({
                from: fromId,
                to: toId,
                arrows: 'to',
                color: {
                    color: edgeColor,
                    highlight: '#FF6B6B'
                },
                smooth: {
                    type: 'continuous'
                },
                title: `${item.line_name}`
            });
        }
    });
    
    nodesData = nodes;
    edgesData = edges;
    
    // Инициализируем граф
    const container = document.getElementById('network-container');
    const data = { nodes: nodes, edges: edges };
    
    const options = {
        physics: {
            enabled: document.getElementById('showPhysics').checked,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
                gravitationalConstant: -50,
                centralGravity: 0.01,
                springLength: 150,
                springConstant: 0.08,
                damping: 0.4,
                avoidOverlap: 0.5
            },
            stabilization: {
                iterations: 200
            }
        },
        // Отключаем иерархическую раскладку для свободного перемещения
        layout: {
            improvedLayout: true,
            randomSeed: 42
        },
        interaction: {
            hover: true,
            navigationButtons: true,
            keyboard: true,
            dragNodes: true,
            dragView: true,
            zoomView: true
        },
        nodes: {
            borderWidth: 2,
            borderWidthSelected: 3
        },
        // Добавляем сетку на фон
        grid: {
            enabled: true,
            color: gridColor,
            size: 20,
            drawInterval: 30
        }
    };
    
    if (network) {
        network.destroy();
    }
    
    network = new vis.Network(container, data, options);
    
    // Событие клика на узел
    network.on('click', function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            showNodeDetails(nodeId);
        }
    });
    
    // При наведении обновляем tooltip с данными accounting
    network.on('hoverNode', function(params) {
        if (currentBuildMode === 'accounting' && accountingData) {
            const nodeId = parseInt(params.node.split('-')[1]);
            const node = nodes.get(params.node);
            if (node && accountingData[nodeId]) {
                const accInfo = accountingData[nodeId];
                if (accInfo.types && accInfo.types.length > 0) {
                    // Обновляем title с информацией о способах учета
                    const rawNode = rawData.find(r => 
                        (r.node_calculate_parameter_id === nodeId) || 
                        (r.child_id === nodeId)
                    );
                    if (rawNode) {
                        let titleHtml = node.title;
                        // Дополняем информацию если её нет
                        if (!titleHtml.includes('Способы учета')) {
                            titleHtml += `<br><br><strong>Способы учета:</strong><br>`;
                            accInfo.types.forEach(t => {
                                titleHtml += `<span style="color: #4ECDC4;">• ${t}</span><br>`;
                            });
                            nodes.update({id: params.node, title: titleHtml});
                        }
                    }
                }
            }
        }
    });
}

function showNodeDetails(visNodeId) {
    const nodeId = parseInt(visNodeId.split('-')[1]);
    const items = rawData.filter(item => item.child_id === nodeId || item.node_id === nodeId);
    
    let html = '';
    if (items.length > 0) {
        const item = items[0];
        html = `
            <div class="node-info">
                <strong>Node ID:</strong> ${item.child_id || item.node_id}
            </div>
            <div class="node-info">
                <strong>Line:</strong> ${item.line_name || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Line ID:</strong> ${item.line_id || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Type:</strong> ${item.node_type_name || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Level:</strong> ${item.level}
            </div>
            <div class="node-info">
                <strong>Path:</strong> <code style="font-size: 11px;">${item.path_str}</code>
            </div>
        `;
    } else {
        html = '<div style="color: var(--text-muted);">Информация не найдена</div>';
    }
    
    document.getElementById('nodeDetails').innerHTML = html;
}

function updateNetworkStats() {
    const uniqueNodes = new Set(rawData.flatMap(item => [item.node_id, item.child_id]));
    const uniqueLines = new Set(rawData.map(item => item.line_id).filter(id => id !== null));
    const maxLevel = Math.max(...rawData.map(item => item.level), 0);
    
    document.getElementById('nodeCount').textContent = uniqueNodes.size;
    document.getElementById('lineCount').textContent = uniqueLines.size;
    document.getElementById('maxLevel').textContent = maxLevel;
    document.getElementById('edgeCount').textContent = edgesData ? edgesData.length : 0;
}

function updateTypeLegend() {
    const legendContainer = document.getElementById('typeLegend');
    const types = Object.keys(nodeTypeColors);
    
    if (types.length === 0) {
        legendContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 12px;">Нет данных о типах</div>';
        return;
    }
    
    let html = '';
    types.forEach(type => {
        const color = nodeTypeColors[type];
        html += `
            <div class="legend-item">
                <div class="legend-color" style="background: ${color};"></div>
                <span>${type}</span>
            </div>
        `;
    });
    
    legendContainer.innerHTML = html;
}

function updateNetworkOptions() {
    if (network && nodesData && edgesData) {
        const showLabels = document.getElementById('showLabels').checked;
        const usePhysics = document.getElementById('showPhysics').checked;
        
        // Обновляем метки
        nodesData.forEach(node => {
            if (showLabels) {
                node.label = `Node ${node.id.split('-')[1]}`;
            } else {
                node.label = '';
            }
        });
        
        // Обновляем физику
        if (network.physics) {
            network.setOptions({ physics: { enabled: usePhysics } });
        }
        
        network.redraw();
    }
}

function generateColorPalette(count) {
    const colors = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#A8E6CF'
    ];
    return colors.slice(0, count);
}

function exportNetwork() {
    if (rawData.length === 0) {
        alert('Сначала загрузите сеть');
        return;
    }
    
    const csv = convertToCSV(rawData);
    downloadCSV(csv, 'network_export.csv');
}

function convertToCSV(data) {
    if (data.length === 0) return '';
    
    const headers = Object.keys(data[0]);
    const rows = [headers.join(',')];
    
    data.forEach(item => {
        const values = headers.map(header => {
            let value = item[header];
            if (value === null || value === undefined) value = '';
            if (typeof value === 'string') value = `"${value.replace(/"/g, '""')}"`;
            return value;
        });
        rows.push(values.join(','));
    });
    
    return rows.join('\n');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', filename);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
