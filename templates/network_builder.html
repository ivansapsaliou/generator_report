<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор сети - Report Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
    
    <style>
        #network-container {
            width: 100%;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            margin-top: 12px;
        }

        #network-container.network-hidden {
            visibility: hidden;
        }
        
        #network-sidebar {
            min-width: 300px;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            max-height: 600px;
            color: var(--text);
        }
        
        .network-layout {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        
        .node-info {
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text);
        }
        
        .node-info strong {
            display: block;
            margin-bottom: 4px;
            color: var(--primary);
        }
        
        .network-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stat-item {
            background: var(--bg);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }
        
        h5, h6 {
            color: var(--text);
        }
        
        .form-label {
            color: var(--text);
        }
        
        .form-control {
            background: var(--bg);
            color: var(--text);
            border-color: var(--border);
        }
        
        .form-control:focus {
            background: var(--bg);
            color: var(--text);
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
        
        .filter-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .filter-item {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-item label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: var(--text-muted);
        }
        
        .filter-item select,
        .filter-item input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }
        
        .filter-item select:disabled,
        .filter-item input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .filter-input-wrapper {
            position: relative;
        }

        .searchable-select {
            position: relative;
            width: 100%;
        }

        .searchable-select-input {
            width: 100%;
            padding: 8px 36px 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .searchable-select-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .searchable-select::after {
            content: '\F282';
            font-family: 'bootstrap-icons';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 12px;
        }

        .searchable-select.open::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .searchable-select-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            z-index: 20;
            display: none;
        }

        .searchable-select.open .searchable-select-dropdown {
            display: block;
        }

        .searchable-select-option {
            padding: 8px 12px;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        .searchable-select-option:last-child {
            border-bottom: none;
        }

        .searchable-select-option:hover,
        .searchable-select-option.active {
            background: rgba(59, 130, 246, 0.12);
        }

        .searchable-select-empty {
            padding: 8px 12px;
            color: var(--text-muted);
            font-size: 13px;
        }
        
        .filter-input-wrapper .search-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        
        .filter-actions {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .filter-item.filter-item-month {
            flex: 0 0 180px;
            min-width: 180px;
        }

        .icon-action-btn {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
            padding: 0;
        }

        .icon-action-btn:hover {
            transform: translateY(-1px);
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
        }

        .icon-action-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid var(--border);
        }
        
        /* Grid background pattern for network container */
        #network-container {
            position: relative;
        }
        
        #network-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--grid-color, rgba(255,255,255,0.05)) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color, rgba(255,255,255,0.05)) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
            border-radius: 8px;
        }
        
        .light-theme #network-container::before {
            background-image: 
                linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
        }
        
        #network-container .vis-network {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
<div class="main-container">

    <!-- SIDEBAR (скопировано из base.html) -->
    <aside class="sidebar">
        <a href="{{ url_for('index') }}" class="sidebar-brand" title="Главная">NL</a>
        <nav class="sidebar-nav">
            <a href="{{ url_for('index') }}"
               class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}"
               title="Отчёты">
                <i class="bi bi-bar-chart-line"></i>
            </a>
            <a href="{{ url_for('scheduled_reports') }}"
               class="sidebar-link {% if request.endpoint == 'scheduled_reports' %}active{% endif %}"
               title="Запланированные отчёты">
                <i class="bi bi-clock"></i>
            </a>
            <a href="{{ url_for('monitoring') }}"
               class="sidebar-link {% if request.endpoint == 'monitoring' %}active{% endif %}"
               title="Мониторинг">
                <i class="bi bi-activity"></i>
            </a>
            <a href="{{ url_for('settings') }}"
               class="sidebar-link {% if request.endpoint == 'settings' %}active{% endif %}"
               title="Настройки">
                <i class="bi bi-gear"></i>
            </a>
            <a href="{{ url_for('network_builder') }}"
               class="sidebar-link {% if request.endpoint == 'network_builder' %}active{% endif %}"
               title="Конструктор сети">
                <i class="bi bi-diagram-3"></i>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="themeToggle" class="theme-toggle" title="Переключить тему">
                <i class="bi bi-sun"></i>
            </button>
        </div>
    </aside>

    <!-- CONTENT -->
    <div class="content-wrapper">
        <div class="top-bar">
            <h1>
                <i class="bi bi-diagram-3"></i>
                Конструктор сети водоснабжения
            </h1>
            <div class="top-actions">
                <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">
                    <i class="bi bi-house"></i> Главная
                </a>
            </div>
        </div>

        <div class="content">
            <!-- Каскадные фильтры -->
            <div class="filter-group">
                <div class="filter-item">
                    <label>Объект</label>
                    <div class="filter-input-wrapper">
                        <div class="searchable-select" id="objectSelectWrapper">
                            <input
                                type="text"
                                id="objectSelectInput"
                                class="searchable-select-input"
                                placeholder="Выберите объект..."
                                autocomplete="off"
                                onfocus="openSearchableSelect('objectSelect')"
                                oninput="handleSearchableInput('objectSelect', this.value)">
                            <input type="hidden" id="objectSelect" value="">
                            <div class="searchable-select-dropdown" id="objectSelectDropdown"></div>
                        </div>
                    </div>
                </div>
                <div class="filter-item">
                    <label>Узел</label>
                    <div class="filter-input-wrapper">
                        <div class="searchable-select" id="nodeSelectWrapper">
                            <input
                                type="text"
                                id="nodeSelectInput"
                                class="searchable-select-input"
                                placeholder="Сначала выберите объект"
                                autocomplete="off"
                                disabled
                                onfocus="openSearchableSelect('nodeSelect')"
                                oninput="handleSearchableInput('nodeSelect', this.value)">
                            <input type="hidden" id="nodeSelect" value="">
                            <div class="searchable-select-dropdown" id="nodeSelectDropdown"></div>
                        </div>
                    </div>
                </div>
                <div class="filter-item">
                    <label>Расчетный параметр (Node ID)</label>
                    <div class="filter-input-wrapper">
                        <div class="searchable-select" id="parameterSelectWrapper">
                            <input
                                type="text"
                                id="parameterSelectInput"
                                class="searchable-select-input"
                                placeholder="Сначала выберите узел"
                                autocomplete="off"
                                disabled
                                onfocus="openSearchableSelect('parameterSelect')"
                                oninput="handleSearchableInput('parameterSelect', this.value)">
                            <input type="hidden" id="parameterSelect" value="">
                            <div class="searchable-select-dropdown" id="parameterSelectDropdown"></div>
                        </div>
                    </div>
                </div>
                <div class="filter-item filter-item-month">
                    <label>Месяц учета</label>
                    <input type="month" id="accountingMonth" onchange="onAccountingMonthChange()">
                </div>
                <div class="filter-actions">
                    <button class="icon-action-btn" type="button" onclick="loadNetwork()" title="Построить сеть">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
                            <path d="M21 3v6h-6"/>
                        </svg>
                    </button>
                    <button class="icon-action-btn" type="button" onclick="exportNetwork()" title="Выгрузить CSV">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 3v12"/>
                            <path d="M7 10l5 5 5-5"/>
                            <path d="M5 21h14"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Основной контейнер -->
            <div class="network-layout">
                <!-- Граф сети -->
                <div style="flex: 1;">
                    <div id="network-container"></div>
                </div>

                <!-- Информация о сети -->
                <div id="network-sidebar">
                    <h5><i class="bi bi-info-circle"></i> Информация о сети</h5>
                    <div class="network-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="nodeCount">0</div>
                            <div>Узлов</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="lineCount">0</div>
                            <div>Линий</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="maxLevel">0</div>
                            <div>Уровней</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="edgeCount">0</div>
                            <div>Связей</div>
                        </div>
                    </div>

                    <h6 style="margin-top: 16px;">Типы узлов (легенда)</h6>
                    <div id="typeLegend" style="margin-bottom: 12px;"></div>

                    <h6 style="margin-top: 16px;">Объекты (рамки на схеме)</h6>
                    <div id="objectLegend" style="margin-bottom: 12px;"></div>

                    <h6 style="margin-top: 16px;">Выбранный элемент</h6>
                    <div id="nodeDetails" style="color: var(--text-muted); font-size: 12px;">
                        Выберите узел на графе для отображения информации
                    </div>

                    <div style="margin-top: 16px;">
                        <label style="font-size: 12px; color: var(--text);">
                            <input type="checkbox" id="showLabels" checked onchange="updateNetworkOptions()">
                            Показывать метки
                        </label>
                        <div style="display: none;">
                            <input type="checkbox" id="showPhysics">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// GLOBAL VARIABLES
// ═════════════════════════════════════════════════════════════════════════════
let network;
let nodesData = [];
let edgesData = [];
let rawData = [];
let nodeTypeColors = {};
let objectLegendColors = {}; // object_id -> border color (для легенды)
let objectLegendEntries = []; // [{ id, name, color }] для боковой легенды
let accountingData = {}; // node_calculate_parameter_id -> accounting types
let selectedAccountingMonth = null;
const searchableSelectState = {
    objectSelect: { options: [] },
    nodeSelect: { options: [] },
    parameterSelect: { options: [] }
};

// ═════════════════════════════════════════════════════════════════════════════
// THEME MANAGEMENT - Управление темой
// ═════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
    const themeToggle = document.getElementById('themeToggle');
    
    // Функция применения темы (как в login.html)
    function applyTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light-theme');
            themeToggle.innerHTML = '<i class="bi bi-moon"></i>';
        } else {
            document.body.classList.remove('light-theme');
            themeToggle.innerHTML = '<i class="bi bi-sun"></i>';
        }
    }
        
    // Получаем сохраненную тему (по умолчанию 'dark')
    const savedTheme = localStorage.getItem('theme') || 'dark';
    applyTheme(savedTheme);
    
    // Обработчик клика по кнопке переключения
    themeToggle.addEventListener('click', function() {
        const next = document.body.classList.contains('light-theme') ? 'dark' : 'light';
        localStorage.setItem('theme', next);
        applyTheme(next);
        
        // Перестраиваем граф при смене темы
        if (rawData.length > 0) {
            buildNetworkGraph(rawData);
        }
    });
    
    // Загружаем список объектов при загрузке страницы
    loadObjects();
    
    const now = new Date();
    const monthStr = now.toISOString().slice(0, 7);
    const monthEl = document.getElementById('accountingMonth');
    if (monthEl) {
        monthEl.value = monthStr;
    }

    // ✅ ВАЖНО: синхронизируем глобальную переменную selectedAccountingMonth,
    // иначе при первом запуске loadNetwork() в режиме accounting будет ругаться,
    // хотя в input месяц визуально уже выбран.
    onAccountingMonthChange();

    document.addEventListener('click', function(event) {
        ['objectSelect', 'nodeSelect', 'parameterSelect'].forEach(baseId => {
            const wrapper = document.getElementById(`${baseId}Wrapper`);
            if (wrapper && !wrapper.contains(event.target)) {
                closeSearchableSelect(baseId, true);
            }
        });
    });
});

// ═════════════════════════════════════════════════════════════════════════════
// CASCADE FILTERS - Каскадные фильтры
// ═════════════════════════════════════════════════════════════════════════════

function getSearchableSelectElements(baseId) {
    return {
        wrapper: document.getElementById(`${baseId}Wrapper`),
        input: document.getElementById(`${baseId}Input`),
        hidden: document.getElementById(baseId),
        dropdown: document.getElementById(`${baseId}Dropdown`)
    };
}

function setSearchableSelectOptions(baseId, options, placeholder, disabled = false) {
    const state = searchableSelectState[baseId];
    const { input, hidden } = getSearchableSelectElements(baseId);
    if (!state || !input || !hidden) return;

    state.options = Array.isArray(options) ? options : [];
    input.value = '';
    hidden.value = '';
    input.placeholder = placeholder;
    input.disabled = disabled;
    closeSearchableSelect(baseId);
}

function openSearchableSelect(baseId) {
    const { wrapper, input } = getSearchableSelectElements(baseId);
    if (!wrapper || !input || input.disabled) return;
    wrapper.classList.add('open');
    renderSearchableSelectOptions(baseId, input.value);
}

function closeSearchableSelect(baseId, trySelectExact = false) {
    const { wrapper, input } = getSearchableSelectElements(baseId);
    if (!wrapper || !input) return;

    if (trySelectExact && input.value.trim()) {
        tryResolveSearchableSelectExactMatch(baseId);
    }

    wrapper.classList.remove('open');
}

function renderSearchableSelectOptions(baseId, searchText = '') {
    const state = searchableSelectState[baseId];
    const { dropdown, hidden } = getSearchableSelectElements(baseId);
    if (!state || !dropdown) return;

    const normalizedSearch = String(searchText || '').trim().toLowerCase();
    const filteredOptions = state.options.filter(option =>
        option.label.toLowerCase().includes(normalizedSearch)
    );

    if (filteredOptions.length === 0) {
        dropdown.innerHTML = '<div class="searchable-select-empty">Ничего не найдено</div>';
        return;
    }

    dropdown.innerHTML = filteredOptions.map(option => {
        const isActive = String(hidden.value) === String(option.value);
        const safeLabel = escapeHtml(option.label);
        return `<div class="searchable-select-option${isActive ? ' active' : ''}" data-value="${escapeHtml(String(option.value))}">${safeLabel}</div>`;
    }).join('');

    dropdown.querySelectorAll('.searchable-select-option').forEach(el => {
        el.addEventListener('mousedown', function(event) {
            event.preventDefault();
            selectSearchableOption(baseId, {
                value: this.dataset.value,
                label: this.textContent || ''
            });
        });
    });
}

function handleSearchableInput(baseId, searchText) {
    const { hidden } = getSearchableSelectElements(baseId);
    if (!hidden) return;
    hidden.value = '';
    openSearchableSelect(baseId);
    renderSearchableSelectOptions(baseId, searchText);
}

function tryResolveSearchableSelectExactMatch(baseId) {
    const state = searchableSelectState[baseId];
    const { input, hidden } = getSearchableSelectElements(baseId);
    if (!state || !input || !hidden) return;

    if (hidden.value) return;

    const normalizedInput = input.value.trim().toLowerCase();
    if (!normalizedInput) return;

    const exactMatch = state.options.find(option => option.label.trim().toLowerCase() === normalizedInput);
    if (exactMatch) {
        selectSearchableOption(baseId, exactMatch);
    }
}

function selectSearchableOption(baseId, option) {
    const { input, hidden } = getSearchableSelectElements(baseId);
    if (!input || !hidden) return;

    input.value = option.label;
    hidden.value = option.value;
    closeSearchableSelect(baseId);

    if (baseId === 'objectSelect') {
        onObjectChange();
    } else if (baseId === 'nodeSelect') {
        onNodeChange();
    } else if (baseId === 'parameterSelect') {
        onParameterChange();
    }
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

async function loadObjects() {
    try {
        console.log('[NETWORK] Loading objects...');
        const response = await fetch('/api/network/objects');
        console.log('[NETWORK] Response status:', response.status);
        
        if (!response.ok) {
            console.error('[NETWORK] HTTP error:', response.status);
            return;
        }
        
        const data = await response.json();
        console.log('[NETWORK] Objects loaded:', data);
        
        if (!data.success) {
            console.error('Error loading objects:', data.error);
            return;
        }
        
        setSearchableSelectOptions(
            'objectSelect',
            data.data.map(obj => ({
                value: obj.object_id,
                label: obj.object_name || `Объект ${obj.object_id}`
            })),
            'Выберите объект...',
            false
        );
        
        console.log('[NETWORK] Objects count:', data.data.length);
        
    } catch (error) {
        console.error('[NETWORK] Error loading objects:', error);
    }
}

async function onObjectChange() {
    const objectId = document.getElementById('objectSelect').value;
    
    // Сброс всех зависимых фильтров
    setSearchableSelectOptions('nodeSelect', [], 'Сначала выберите объект', true);
    setSearchableSelectOptions('parameterSelect', [], 'Сначала выберите узел', true);
    
    if (!objectId) return;
    
    try {
        const response = await fetch(`/api/network/nodes?object_id=${objectId}`);
        const data = await response.json();
        
        if (!data.success) {
            console.error('Error loading nodes:', data.error);
            return;
        }
        
        setSearchableSelectOptions(
            'nodeSelect',
            data.data.map(node => ({
                value: node.node_id,
                label: node.node_name || `Node ${node.node_id}`
            })),
            'Выберите узел...',
            false
        );
        
    } catch (error) {
        console.error('Error loading nodes:', error);
    }
}

async function onNodeChange() {
    const nodeId = document.getElementById('nodeSelect').value;
    
    // Сброс зависимого фильтра
    setSearchableSelectOptions('parameterSelect', [], 'Сначала выберите узел', true);
    
    if (!nodeId) return;
    
    try {
        const response = await fetch(`/api/network/parameters?node_id=${nodeId}`);
        const data = await response.json();
        
        if (!data.success) {
            console.error('Error loading parameters:', data.error);
            return;
        }
        
        setSearchableSelectOptions(
            'parameterSelect',
            data.data.map(param => ({
                value: param.node_calculate_parameter_id,
                label: param.parameter_name
            })),
            'Выберите параметр...',
            false
        );
        
    } catch (error) {
        console.error('Error loading parameters:', error);
    }
}

    // Можно добавить дополнительную логику при выборе параметра

    } else {

// ═════════════════════════════════════════════════════════════════════════════
// NETWORK BUILDER - Конструктор сети
// ═════════════════════════════════════════════════════════════════════════════

async function loadNetwork() {
    // Получаем root_node_id из выпадающего списка
    const rootNodeId = document.getElementById('parameterSelect').value;
    
    if (!rootNodeId || rootNodeId <= 0) {
        alert('Пожалуйста, выберите расчетный параметр');
        return;
    }
    
    if (!selectedAccountingMonth) {
        alert('Пожалуйста, выберите месяц для построения');
        return;
    }
        
    try {
        console.log(`[NETWORK] Loading network tree for node ${rootNodeId} in accounting mode`);
        
        let url = `/api/network/tree?root_node_id=${rootNodeId}`;
        url += `&accounting_month=${selectedAccountingMonth}&use_accounting=true`;
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data.success) {
            alert('Ошибка: ' + (data.error || 'Unknown error'));
            return;
        }
        
        rawData = data.data;
        
        // Сохраняем данные о способах учета, если они есть
        if (data.accounting_data) {
            accountingData = data.accounting_data;
            console.log(`[NETWORK] ✅ Loaded accounting data for ${Object.keys(accountingData).length} nodes`);
        }
        
        buildNetworkGraph(data.data);
        updateNetworkStats();
        console.log(`[NETWORK] ✅ Network loaded successfully with ${data.data.length} nodes`);
        
    } catch (error) {
        console.error('Error loading network:', error);
        alert('Ошибка при загрузке сети: ' + error.message);
    }
}

function buildNetworkGraph(treeData) {
    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();

    const processedNodes = new Set();
    const processedEdges = new Set();

    // node_type_name -> color
    const nodeTypeColorsLocal = {};
    const typeColorPalette = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7B801', '#A06CD5', '#5DD39E', '#EF476F', '#118AB2'
    ];
    let typeColorIndex = 0;

    const getTypeColor = (typeName) => {
        const key = typeName || 'N/A';
        if (!nodeTypeColorsLocal[key]) {
            nodeTypeColorsLocal[key] = typeColorPalette[typeColorIndex % typeColorPalette.length];
            typeColorIndex++;
        }
        return nodeTypeColorsLocal[key];
    };

    const hexToRgba = (hexColor, alpha) => {
        if (!hexColor || typeof hexColor !== 'string') {
            return `rgba(156, 163, 175, ${alpha})`;
        }
        const hex = hexColor.replace('#', '');
        if (hex.length !== 6) {
            return `rgba(156, 163, 175, ${alpha})`;
        }
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        if (Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b)) {
            return `rgba(156, 163, 175, ${alpha})`;
        }
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    };

    const hasActiveAccounting = (nodeId) => {
        const acc = accountingData?.[String(nodeId)] ?? accountingData?.[nodeId];
        return Array.isArray(acc?.types) && acc.types.length > 0;
    };

    const calculateDimmedNodesForAccounting = () => {
        const adjacency = new Map();
        const indegree = new Map();

        const ensureNodeInGraph = (nodeId) => {
            if (!indegree.has(nodeId)) indegree.set(nodeId, 0);
            if (!adjacency.has(nodeId)) adjacency.set(nodeId, new Set());
        };

        treeData.forEach(row => {
            const nodeId = Number(row.child_id ?? row.node_calculate_parameter_id ?? row.node_id);
            if (!Number.isNaN(nodeId)) ensureNodeInGraph(nodeId);
        });

        treeData.forEach(row => {
            const parentId = Number(row.node_id);
            const childId = Number(row.child_id);

            if (Number.isNaN(parentId) || Number.isNaN(childId)) return;
            if (parentId === childId) return;

            ensureNodeInGraph(parentId);
            ensureNodeInGraph(childId);

            if (!adjacency.get(parentId).has(childId)) {
                adjacency.get(parentId).add(childId);
                indegree.set(childId, (indegree.get(childId) || 0) + 1);
            }
        });

        let roots = Array.from(indegree.entries())
            .filter(([, degree]) => degree === 0)
            .map(([nodeId]) => nodeId);

        if (roots.length === 0) {
            roots = treeData
                .filter(row => Number(row.level) === 0)
                .map(row => Number(row.child_id ?? row.node_id))
                .filter(nodeId => !Number.isNaN(nodeId));
        }

        const queue = roots.map(nodeId => ({ nodeId, blocked: false }));
        const visitedStates = new Set();
        const reachableHealthy = new Set();
        const reachableBlocked = new Set();

        queue.forEach(({ nodeId }) => {
            reachableHealthy.add(nodeId);
        });

        while (queue.length > 0) {
            const { nodeId, blocked } = queue.shift();
            const stateKey = `${nodeId}|${blocked ? 1 : 0}`;
            if (visitedStates.has(stateKey)) continue;
            visitedStates.add(stateKey);

            const children = adjacency.get(nodeId);
            if (!children || children.size === 0) continue;

            const parentHasAccounting = hasActiveAccounting(nodeId);

            children.forEach(childId => {
                // Затемняем только последующие узлы:
                // если на пути уже был проблемный узел ИЛИ текущий родитель без активного способа учета.
                const nextBlocked = blocked || !parentHasAccounting;
                if (nextBlocked) {
                    reachableBlocked.add(childId);
                } else {
                    reachableHealthy.add(childId);
                }
                queue.push({ nodeId: childId, blocked: nextBlocked });
            });
        }

        return new Set(
            Array.from(reachableBlocked).filter(nodeId => !reachableHealthy.has(nodeId))
        );
    };

    const dimmedNodeIds = calculateDimmedNodesForAccounting();

    const objectBoxPalette = [
        '#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#06b6d4', '#eab308',
        '#f97316', '#84cc16'
    ];

    const buildObjectGroupsForDrawing = () => {
        const map = new Map();
        treeData.forEach(row => {
            const oid = row.object_id;
            if (oid == null || oid === undefined) return;
            const cid = row.child_id;
            if (cid == null) return;
            const visId = `node-${cid}`;
            const key = Number(oid);
            if (!map.has(key)) {
                map.set(key, {
                    name: (row.object_name && String(row.object_name).trim()) ? row.object_name : `Объект ${key}`,
                    visIds: new Set()
                });
            }
            map.get(key).visIds.add(visId);
        });
        return map;
    };

    const objectGroupsForDrawing = buildObjectGroupsForDrawing();

    objectLegendColors = {};
    objectLegendEntries = [];
    const sortedObjectIds = Array.from(objectGroupsForDrawing.keys()).sort((a, b) => a - b);
    sortedObjectIds.forEach((oid, idx) => {
        const c = objectBoxPalette[idx % objectBoxPalette.length];
        objectLegendColors[String(oid)] = c;
        const info = objectGroupsForDrawing.get(oid);
        objectLegendEntries.push({
            id: oid,
            name: info ? info.name : `Объект ${oid}`,
            color: c
        });
    });

    const roundRectPath = (ctx, x, y, w, h, r) => {
        const rr = Math.min(Math.max(0, r), Math.abs(w) / 2, Math.abs(h) / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
    };

    const getObjectBounds = (visIds, padding = 28) => {
        if (!network || !Array.isArray(visIds) || visIds.length === 0) return null;

        const positions = network.getPositions(visIds);
        const coords = Object.values(positions).filter(p => p && typeof p.x === 'number' && typeof p.y === 'number');
        if (coords.length === 0) return null;

        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        coords.forEach(p => {
            minX = Math.min(minX, p.x);
            minY = Math.min(minY, p.y);
            maxX = Math.max(maxX, p.x);
            maxY = Math.max(maxY, p.y);
        });

        return {
            minX: minX - padding,
            minY: minY - padding,
            maxX: maxX + padding,
            maxY: maxY + padding
        };
    };

    const boxesOverlap = (a, b, gap = 24) => {
        if (!a || !b) return false;
        return !(
            a.maxX + gap < b.minX ||
            a.minX - gap > b.maxX ||
            a.maxY + gap < b.minY ||
            a.minY - gap > b.maxY
        );
    };

    const shiftObjectGroup = (visIds, deltaY) => {
        if (!network || !deltaY || !Array.isArray(visIds) || visIds.length === 0) return;

        const positions = network.getPositions(visIds);
        visIds.forEach(visId => {
            const pos = positions[visId];
            if (!pos) return;
            network.moveNode(visId, pos.x, pos.y + deltaY);
        });
    };

    const enforceObjectSeparation = () => {
        if (!network || !objectGroupsForDrawing || objectGroupsForDrawing.size <= 1) return;

        const placedBounds = [];
        const groups = Array.from(objectGroupsForDrawing.entries()).map(([oid, info]) => ({
            oid,
            visIds: Array.from(info.visIds)
        }));

        groups.sort((a, b) => {
            const boundsA = getObjectBounds(a.visIds, 28);
            const boundsB = getObjectBounds(b.visIds, 28);
            return (boundsA?.minY ?? 0) - (boundsB?.minY ?? 0);
        });

        groups.forEach(group => {
            let bounds = getObjectBounds(group.visIds, 28);
            if (!bounds) return;

            let requiredShift = 0;
            placedBounds.forEach(prevBounds => {
                if (boxesOverlap(bounds, prevBounds, 36)) {
                    requiredShift = Math.max(requiredShift, prevBounds.maxY - bounds.minY + 48);
                }
            });

            if (requiredShift > 0) {
                shiftObjectGroup(group.visIds, requiredShift);
                bounds = getObjectBounds(group.visIds, 28);
                if (!bounds) return;
            }

            placedBounds.push(bounds);
        });
    };

    const getNodeLabel = (row, nodeId) => {
        const name = row?.node_name || `Node ${nodeId}`;
        return name.length > 20 ? name.substring(0, 17) + '...' : name;
    };

    const formatRuDateTime = (dtStr) => {
        // "2026-02-01 00:00:00" -> readable ru-RU
        if (!dtStr) return '';
        const iso = String(dtStr).replace(' ', 'T');
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return String(dtStr);
        return d.toLocaleString('ru-RU', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    };

    const buildAccountingHtml = (nodeId) => {
        if (!accountingData) return '';
        // accountingData keys may be strings ("409") even if nodeId is number
        const acc = accountingData[String(nodeId)] || accountingData[nodeId];
        if (!acc) return '';

        let html = `<hr style="margin:6px 0;opacity:.25;">`;
        html += `<strong>Способы учета:</strong> ${
            Array.isArray(acc.types) && acc.types.length ? acc.types.join(', ') : '—'
        }<br>`;

        if (Array.isArray(acc.valid_periods) && acc.valid_periods.length > 0) {
            html += `<strong>Периоды действия:</strong><br>`;
            acc.valid_periods.forEach((p, idx) => {
                const start = formatRuDateTime(p.start);
                const end = formatRuDateTime(p.end);
                html += `&nbsp;&nbsp;${idx + 1}) ${start} — ${end}<br>`;
            });
        }

        return html;
    };

    const buildNodeTitle = (row, nodeId) => {
        let html = `<strong>Node ID:</strong> ${nodeId}<br>`;
        html += `<strong>Name:</strong> ${row?.node_name || 'N/A'}<br>`;
        html += `<strong>Line:</strong> ${row?.line_name || 'N/A'}<br>`;
        html += `<strong>Type:</strong> ${row?.node_type_name || 'N/A'}<br>`;
        html += `<strong>Level:</strong> ${row?.level ?? 'N/A'}<br>`;
        if (row?.object_id != null || row?.object_name) {
            html += `<strong>Объект:</strong> ${row?.object_name || 'N/A'} <small>(ID: ${row?.object_id ?? '—'})</small><br>`;
        }
        html += buildAccountingHtml(nodeId);
        return html;
    };

    const ensureNode = (nodeId, rowHint) => {
        if (nodeId == null) return;
        const visNodeId = `node-${nodeId}`;
        if (processedNodes.has(visNodeId)) return;

        const row =
            rowHint ||
            treeData.find(r => r.child_id === nodeId) ||
            treeData.find(r => r.node_id === nodeId) ||
            {};

        const typeName = row.node_type_name || 'N/A';
        const color = getTypeColor(typeName);
        const isDimmed = dimmedNodeIds.has(Number(nodeId));

        processedNodes.add(visNodeId);
        nodes.add({
            id: visNodeId,
            label: getNodeLabel(row, nodeId),
            title: buildNodeTitle(row, nodeId),
            shape: 'dot',
            size: 22,
            level: Number.isFinite(Number(row?.level)) ? Number(row.level) : undefined,
            color: {
                background: isDimmed ? hexToRgba(color, 0.28) : color,
                border: isDimmed ? '#6B7280' : '#2C2C2C',
                highlight: {
                    background: isDimmed ? hexToRgba(color, 0.4) : color,
                    border: isDimmed ? '#9CA3AF' : '#FF6B6B'
                },
                hover: {
                    background: isDimmed ? hexToRgba(color, 0.35) : color,
                    border: isDimmed ? '#9CA3AF' : '#FFD166'
                }
            },
            font: {
                color: isDimmed
                    ? (document.body.classList.contains('light-theme') ? '#9CA3AF' : '#6B7280')
                    : (document.body.classList.contains('light-theme') ? '#111827' : '#E5E7EB'),
                size: 12,
                face: 'Arial'
            }
        });
    };

    // 1) Create nodes primarily from child_id (these represent the actual nodes shown per level)
    treeData.forEach(row => {
        const nodeId = row.child_id ?? row.node_calculate_parameter_id ?? row.node_id;
        ensureNode(nodeId, row);
    });

    // 2) Create edges strictly parent(node_id) -> child(child_id), skipping self-loops
    treeData.forEach(row => {
        const parentId = row.node_id;
        const childId = row.child_id;

        if (parentId == null || childId == null) return;
        if (parentId === childId) return; // skip root self relation and any accidental loops

        ensureNode(parentId, null);
        ensureNode(childId, row);

        const fromId = `node-${parentId}`;
        const toId = `node-${childId}`;
        const edgeKey = `${fromId}->${toId}`;
        if (processedEdges.has(edgeKey)) return;
        processedEdges.add(edgeKey);

        edges.add({
            from: fromId,
            to: toId,
            arrows: 'to',
            color: {
                color: '#9CA3AF',
                highlight: '#FF6B6B'
            },
            smooth: { type: 'continuous' },
            title: row.line_name ? String(row.line_name) : ''
        });
    });

    nodesData = nodes;
    edgesData = edges;

    const container = document.getElementById('network-container');
    const data = { nodes, edges };

    const options = {
        physics: {
            enabled: document.getElementById('showPhysics')?.checked ?? true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
                gravitationalConstant: -50,
                centralGravity: 0.01,
                springLength: 150,
                springConstant: 0.08,
                damping: 0.4,
                avoidOverlap: 0.7
            },
            stabilization: { iterations: 150 }
        },
        layout: { improvedLayout: true },
        nodes: {
            borderWidth: 2,
            shadow: {
                enabled: true,
                color: 'rgba(0,0,0,0.2)',
                size: 5,
                x: 1,
                y: 1
            }
        },
        edges: {
            width: 2,
            shadow: {
                enabled: true,
                color: 'rgba(0,0,0,0.1)',
                size: 3,
                x: 1,
                y: 1
            },
            arrows: {
                to: { enabled: true, scaleFactor: 1, type: 'arrow' }
            }
        },
        interaction: {
            hover: true,
            tooltipDelay: 200,
            navigationButtons: true,
            keyboard: true
        }
    };

    // Destroy previous network if exists
    if (network) {
        network.destroy();
        network = null;
    }

    container.classList.add('network-hidden');
    network = new vis.Network(container, data, options);

    let separationApplied = false;
    const applyObjectSeparationOnce = () => {
        if (separationApplied) return;
        separationApplied = true;
        enforceObjectSeparation();
        network.redraw();
        container.classList.remove('network-hidden');
    };

    setTimeout(applyObjectSeparationOnce, 250);
    network.once('stabilized', applyObjectSeparationOnce);

    network.on('beforeDrawing', function(ctx) {
        if (!objectGroupsForDrawing || objectGroupsForDrawing.size === 0) return;

        const isLight = document.body.classList.contains('light-theme');
        const labelFill = isLight ? '#374151' : '#e5e7eb';
        const fillAlpha = isLight ? 0.07 : 0.09;
        const pad = 28;
        const lineW = 2;

        objectGroupsForDrawing.forEach((info, oid) => {
            const ids = Array.from(info.visIds);
            if (ids.length === 0) return;

            const positions = network.getPositions(ids);
            const coords = Object.values(positions).filter(p => p && typeof p.x === 'number' && typeof p.y === 'number');
            if (coords.length === 0) return;

            let minX = Infinity;
            let minY = Infinity;
            let maxX = -Infinity;
            let maxY = -Infinity;
            coords.forEach(p => {
                minX = Math.min(minX, p.x);
                minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x);
                maxY = Math.max(maxY, p.y);
            });

            minX -= pad;
            minY -= pad;
            maxX += pad;
            maxY += pad;

            const w = maxX - minX;
            const h = maxY - minY;
            const borderColor = objectLegendColors[String(oid)] || objectBoxPalette[0];

            ctx.save();
            ctx.lineWidth = lineW;
            ctx.fillStyle = hexToRgba(borderColor, fillAlpha);
            ctx.strokeStyle = hexToRgba(borderColor, isLight ? 0.45 : 0.55);
            roundRectPath(ctx, minX, minY, w, h, 14);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = labelFill;
            ctx.font = '600 13px Arial, sans-serif';
            const rawName = info.name || `Объект ${oid}`;
            const label = rawName.length > 42 ? rawName.substring(0, 39) + '…' : rawName;
            ctx.fillText(label, minX + 10, minY + 18);
            ctx.restore();
        });
    });

    // Click node -> details
    network.on('click', function(params) {
        if (params.nodes.length > 0) {
            const nodeVisId = params.nodes[0]; // "node-409"
            showNodeDetails(nodeVisId);
        }
    });

    // Ensure tooltips update with fresh accounting data
    network.on('hoverNode', function(params) {
        const nodeVisId = params.node;
        const m = String(nodeVisId).match(/^node-(\d+)$/);
        if (!m) return;
        const nodeIdNum = parseInt(m[1], 10);

        const node = nodes.get(nodeVisId);
        if (!node) return;

        // Rebuild title to include fresh accounting periods
        // Find a hint row for display fields
        const hintRow = treeData.find(r => r.child_id === nodeIdNum) || treeData.find(r => r.node_id === nodeIdNum) || {};
        const newTitle = buildNodeTitle(hintRow, nodeIdNum);

        nodes.update({ id: nodeVisId, title: newTitle });
    });

    // Update stats if you have these functions
    if (typeof updateNetworkStats === 'function') updateNetworkStats();
    if (typeof updateTypeLegend === 'function') {
        // keep compatibility with existing legend logic if it reads global nodeTypeColors
        nodeTypeColors = { ...nodeTypeColorsLocal };
        updateTypeLegend();
    } else {
        nodeTypeColors = { ...nodeTypeColorsLocal };
    }

    if (typeof updateObjectLegend === 'function') updateObjectLegend();
}

function showNodeDetails(visNodeId) {
    const m = String(visNodeId).match(/^node-(\d+)$/);
    if (!m) return;
    const nodeId = parseInt(m[1], 10);
    const items = rawData.filter(item => item.child_id === nodeId || item.node_id === nodeId);
    
    let html = '';
    if (items.length > 0) {
        const item = items[0];
        const objectBlock = (item.object_id != null || item.object_name)
            ? `
            <div class="node-info">
                <strong>Объект:</strong> ${item.object_name || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Object ID:</strong> ${item.object_id != null ? item.object_id : 'N/A'}
            </div>`
            : '';
        html = `
            <div class="node-info">
                <strong>Node ID:</strong> ${item.child_id || item.node_id}
            </div>
            ${objectBlock}
            <div class="node-info">
                <strong>Line:</strong> ${item.line_name || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Line ID:</strong> ${item.line_id || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Type:</strong> ${item.node_type_name || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Level:</strong> ${item.level}
            </div>
            <div class="node-info">
                <strong>Path:</strong> <code style="font-size: 11px;">${item.path_str}</code>
            </div>
        `;
    } else {
        html = '<div style="color: var(--text-muted);">Информация не найдена</div>';
    }
    
    document.getElementById('nodeDetails').innerHTML = html;
}

function updateNetworkStats() {
    const uniqueNodes = new Set(rawData.flatMap(item => [item.node_id, item.child_id]));
    const uniqueLines = new Set(rawData.map(item => item.line_id).filter(id => id !== null));
    const maxLevel = Math.max(...rawData.map(item => item.level), 0);
    
    document.getElementById('nodeCount').textContent = uniqueNodes.size;
    document.getElementById('lineCount').textContent = uniqueLines.size;
    document.getElementById('maxLevel').textContent = maxLevel;
    document.getElementById('edgeCount').textContent = edgesData ? edgesData.length : 0;
}

function updateTypeLegend() {
    const legendContainer = document.getElementById('typeLegend');
    const types = Object.keys(nodeTypeColors);
    
    if (types.length === 0) {
        legendContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 12px;">Нет данных о типах</div>';
        return;
    }
    
    let html = '';
    types.forEach(type => {
        const color = nodeTypeColors[type];
        html += `
            <div class="legend-item">
                <div class="legend-color" style="background: ${color};"></div>
                <span>${type}</span>
            </div>
        `;
    });
    
    legendContainer.innerHTML = html;
}

function updateObjectLegend() {
    const legendContainer = document.getElementById('objectLegend');
    if (!legendContainer) return;

    if (!objectLegendEntries || objectLegendEntries.length === 0) {
        legendContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 12px;">Нет привязки узлов к объекту</div>';
        return;
    }

    let html = '';
    objectLegendEntries.forEach(entry => {
        html += `
            <div class="legend-item">
                <div class="legend-color" style="background: transparent; border: 2px solid ${entry.color};"></div>
                <span title="ID ${entry.id}">${entry.name}</span>
            </div>
        `;
    });
    legendContainer.innerHTML = html;
}

function updateNetworkOptions() {
    if (network && nodesData && edgesData) {
        const showLabels = document.getElementById('showLabels').checked;
        const usePhysics = document.getElementById('showPhysics')?.checked ?? true;
        
        // Обновляем метки
        nodesData.forEach(node => {
            if (showLabels) {
                node.label = `Node ${node.id.split('-')[1]}`;
            } else {
                node.label = '';
            }
        });

        if (network.physics) {
            network.setOptions({ physics: { enabled: usePhysics } });
        }

        network.redraw();
    }
}

function generateColorPalette(count) {
    const colors = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#A8E6CF'
    ];
    return colors.slice(0, count);
}

function exportNetwork() {
    if (rawData.length === 0) {
        alert('Сначала загрузите сеть');
        return;
    }
    
    const csv = convertToCSV(rawData);
    downloadCSV(csv, 'network_export.csv');
}

function convertToCSV(data) {
    if (data.length === 0) return '';
    
    const headers = Object.keys(data[0]);
    const rows = [headers.join(',')];
    
    data.forEach(item => {
        const values = headers.map(header => {
            let value = item[header];
            if (value === null || value === undefined) value = '';
            if (typeof value === 'string') value = `"${value.replace(/"/g, '""')}"`;
            return value;
        });
        rows.push(values.join(','));
    });
    
    return rows.join('\n');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', filename);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
