<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор сети - Report Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
    
    <style>
        #network-container {
            width: 100%;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            margin-top: 12px;
        }
        
        #network-sidebar {
            min-width: 300px;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            max-height: 600px;
            color: var(--text);
        }
        
        .network-layout {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        
        .node-info {
            background: var(--bg);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text);
        }
        
        .node-info strong {
            display: block;
            margin-bottom: 4px;
            color: var(--primary);
        }
        
        .network-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .stat-item {
            background: var(--bg);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }
        
        h5, h6 {
            color: var(--text);
        }
        
        .form-label {
            color: var(--text);
        }
        
        .form-control {
            background: var(--bg);
            color: var(--text);
            border-color: var(--border);
        }
        
        .form-control:focus {
            background: var(--bg);
            color: var(--text);
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
    </style>
</head>
<body>
<div class="main-container">

    <!-- SIDEBAR (скопировано из base.html) -->
    <aside class="sidebar">
        <a href="{{ url_for('index') }}" class="sidebar-brand" title="Главная">NL</a>
        <nav class="sidebar-nav">
            <a href="{{ url_for('index') }}"
               class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}"
               title="Отчёты">
                <i class="bi bi-bar-chart-line"></i>
            </a>
            <a href="{{ url_for('scheduled_reports') }}"
               class="sidebar-link {% if request.endpoint == 'scheduled_reports' %}active{% endif %}"
               title="Запланированные отчёты">
                <i class="bi bi-clock"></i>
            </a>
            <a href="{{ url_for('monitoring') }}"
               class="sidebar-link {% if request.endpoint == 'monitoring' %}active{% endif %}"
               title="Мониторинг">
                <i class="bi bi-activity"></i>
            </a>
            <a href="{{ url_for('settings') }}"
               class="sidebar-link {% if request.endpoint == 'settings' %}active{% endif %}"
               title="Настройки">
                <i class="bi bi-gear"></i>
            </a>
            <a href="{{ url_for('network_builder') }}"
               class="sidebar-link {% if request.endpoint == 'network_builder' %}active{% endif %}"
               title="Конструктор сети">
                <i class="bi bi-diagram-3"></i>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="themeToggle" class="theme-toggle" title="Переключить тему">
                <i class="bi bi-sun"></i>
            </button>
        </div>
    </aside>

    <!-- CONTENT -->
    <div class="content-wrapper">
        <div class="top-bar">
            <h1>
                <i class="bi bi-diagram-3"></i>
                Конструктор сети водоснабжения
            </h1>
            <div class="top-actions">
                <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">
                    <i class="bi bi-house"></i> Главная
                </a>
            </div>
        </div>

        <div class="content">
            <!-- Параметры ввода -->
            <div style="display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 250px;">
                    <label class="form-label">Начальный узел (Node ID)</label>
                    <input type="number" id="rootNodeId" class="form-control" placeholder="Например: 399" value="399">
                </div>
                <button class="btn btn-primary" onclick="loadNetwork()">
                    <i class="bi bi-arrow-repeat"></i> Загрузить сеть
                </button>
                <button class="btn btn-secondary" onclick="exportNetwork()">
                    <i class="bi bi-download"></i> Экспорт CSV
                </button>
            </div>

            <!-- Основной контейнер -->
            <div class="network-layout">
                <!-- Граф сети -->
                <div style="flex: 1;">
                    <div id="network-container"></div>
                </div>

                <!-- Информация о сети -->
                <div id="network-sidebar">
                    <h5><i class="bi bi-info-circle"></i> Информация о сети</h5>
                    <div class="network-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="nodeCount">0</div>
                            <div>Узлов</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="lineCount">0</div>
                            <div>Линий</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="maxLevel">0</div>
                            <div>Уровней</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="edgeCount">0</div>
                            <div>Связей</div>
                        </div>
                    </div>

                    <h6 style="margin-top: 16px;">Выбранный элемент</h6>
                    <div id="nodeDetails" style="color: var(--text-muted); font-size: 12px;">
                        Выберите узел на графе для отображения информации
                    </div>

                    <div style="margin-top: 16px;">
                        <label style="font-size: 12px; color: var(--text);">
                            <input type="checkbox" id="showLabels" checked onchange="updateNetworkOptions()">
                            Показывать метки
                        </label>
                        <br>
                        <label style="font-size: 12px; color: var(--text);">
                            <input type="checkbox" id="showPhysics" onchange="updateNetworkOptions()">
                            Физическое моделирование
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// THEME MANAGEMENT - Управление темой
// ═════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
    const themeToggle = document.getElementById('themeToggle');
    
    // Получаем сохраненную тему или определяем по системе
    let savedTheme = localStorage.getItem('theme');
    if (!savedTheme) {
        savedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    
    applyTheme(savedTheme);
    
    // Обработчик клика по кнопке переключения
    themeToggle.addEventListener('click', function() {
        const currentTheme = localStorage.getItem('theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
        
        // Перестраиваем граф при смене темы
        if (rawData.length > 0) {
            buildNetworkGraph(rawData);
        }
    });
    
    function applyTheme(theme) {
        // Применяем класс к body
        if (theme === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
        
        // Обновляем иконку
        const icon = themeToggle.querySelector('i');
        if (icon) {
            icon.className = theme === 'dark' ? 'bi bi-moon' : 'bi bi-sun';
        }
    }
    
    // Загружаем сеть при загрузке страницы
    loadNetwork();
});

// ═════════════════════════════════════════════════════════════════════════════
// NETWORK BUILDER - Конструктор сети
// ═════════════════════════════════════════════════════════════════════════════
let network;
let nodesData = [];
let edgesData = [];
let rawData = [];

async function loadNetwork() {
    const rootNodeId = parseInt(document.getElementById('rootNodeId').value);
    
    if (!rootNodeId || rootNodeId <= 0) {
        alert('Пожалуйста, введите корректный Node ID');
        return;
    }
    
    try {
        console.log(`[NETWORK] Loading network tree for node ${rootNodeId}`);
        const response = await fetch(`/api/network/tree?root_node_id=${rootNodeId}`);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        
        if (!data.success) {
            alert('Ошибка: ' + (data.error || 'Unknown error'));
            return;
        }
        
        rawData = data.data;
        buildNetworkGraph(data.data);
        updateNetworkStats();
        console.log(`[NETWORK] ✅ Network loaded successfully with ${data.data.length} nodes`);
        
    } catch (error) {
        console.error('Error loading network:', error);
        alert('Ошибка при загрузке сети: ' + error.message);
    }
}

function buildNetworkGraph(treeData) {
    const nodes = new vis.DataSet();
    const edges = new vis.DataSet();
    
    const nodeMap = new Map(); // node_id -> vis node id
    const levelColors = generateColorPalette(10);
    
    // Определяем цвета в зависимости от темы
    const isDark = !document.body.classList.contains('light-theme');
    const edgeColor = isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
    const fontColor = isDark ? '#ffffff' : '#000000';
    const borderColor = isDark ? '#666666' : '#333333';
    
    // Добавляем корневой узел
    const rootNode = treeData[0];
    if (!rootNode) {
        console.warn('[NETWORK] No data received');
        return;
    }
    
    const rootVisId = `node-${rootNode.node_id}`;
    nodeMap.set(rootNode.node_id, rootVisId);
    
    // Функция для получения отображаемого имени узла
    const getNodeLabel = (node) => {
        if (!document.getElementById('showLabels').checked) return '';
        const name = node.node_name || `Node ${node.node_id}`;
        return name.length > 20 ? name.substring(0, 17) + '...' : name;
    };
    
    nodes.add({
        id: rootVisId,
        label: getNodeLabel(rootNode),
        title: `<strong>Node ID:</strong> ${rootNode.node_id}<br><strong>Name:</strong> ${rootNode.node_name || 'N/A'}<br><strong>Line:</strong> ${rootNode.line_name || 'N/A'}`,
        level: 0,
        color: {
            background: levelColors[0],
            border: borderColor,
            highlight: {
                background: '#FF6B6B',
                border: borderColor
            }
        },
        shape: 'dot',
        size: 30,
        font: {
            size: 14,
            color: fontColor,
            bold: {
                color: fontColor
            }
        }
    });
    
    // Обрабатываем остальные узлы
    treeData.forEach(item => {
        if (item.level === 0) return; // Пропускаем корень
        
        const nodeId = item.child_id;
        const visId = `node-${nodeId}`;
        
        if (!nodeMap.has(nodeId)) {
            nodeMap.set(nodeId, visId);
            
            const color = levelColors[Math.min(item.level, levelColors.length - 1)];
            nodes.add({
                id: visId,
                label: getNodeLabel(item),
                title: `<strong>Node ID:</strong> ${nodeId}<br><strong>Name:</strong> ${item.node_name || 'N/A'}<br><strong>Line:</strong> ${item.line_name}<br><strong>Level:</strong> ${item.level}<br><strong>Path:</strong> ${item.path_str}`,
                level: item.level,
                color: {
                    background: color,
                    border: borderColor,
                    highlight: {
                        background: '#FF6B6B',
                        border: borderColor
                    }
                },
                shape: 'dot',
                size: 25 - (item.level * 2),
                font: {
                    size: 12,
                    color: fontColor,
                    bold: {
                        color: fontColor
                    }
                }
            });
        }
    });
    
    // Добавляем связи между узлами
    const processedEdges = new Set();
    treeData.forEach(item => {
        if (item.level === 0) return;
        
        const fromId = `node-${item.node_id}`;
        const toId = `node-${item.child_id}`;
        const edgeKey = `${fromId}-${toId}`;
        
        if (!processedEdges.has(edgeKey)) {
            processedEdges.add(edgeKey);
            edges.add({
                from: fromId,
                to: toId,
                arrows: 'to',
                color: {
                    color: edgeColor,
                    highlight: '#FF6B6B'
                },
                smooth: {
                    type: 'continuous'
                },
                title: `${item.line_name}`
            });
        }
    });
    
    nodesData = nodes;
    edgesData = edges;
    
    // Инициализируем граф
    const container = document.getElementById('network-container');
    const data = { nodes: nodes, edges: edges };
    
    const options = {
        physics: {
            enabled: document.getElementById('showPhysics').checked,
            stabilization: {
                iterations: 200
            }
        },
        layout: {
            hierarchical: {
                enabled: true,
                direction: 'UD',
                sortMethod: 'directed'
            }
        },
        interaction: {
            hover: true,
            navigationButtons: true,
            keyboard: true
        },
        nodes: {
            borderWidth: 2,
            borderWidthSelected: 3
        }
    };
    
    if (network) {
        network.destroy();
    }
    
    network = new vis.Network(container, data, options);
    
    // Событие клика на узел
    network.on('click', function(params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            showNodeDetails(nodeId);
        }
    });
}

function showNodeDetails(visNodeId) {
    const nodeId = parseInt(visNodeId.split('-')[1]);
    const items = rawData.filter(item => item.child_id === nodeId || item.node_id === nodeId);
    
    let html = '';
    if (items.length > 0) {
        const item = items[0];
        html = `
            <div class="node-info">
                <strong>Node ID:</strong> ${item.child_id || item.node_id}
            </div>
            <div class="node-info">
                <strong>Line:</strong> ${item.line_name || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Line ID:</strong> ${item.line_id || 'N/A'}
            </div>
            <div class="node-info">
                <strong>Level:</strong> ${item.level}
            </div>
            <div class="node-info">
                <strong>Path:</strong> <code style="font-size: 11px;">${item.path_str}</code>
            </div>
        `;
    } else {
        html = '<div style="color: var(--text-muted);">Информация не найдена</div>';
    }
    
    document.getElementById('nodeDetails').innerHTML = html;
}

function updateNetworkStats() {
    const uniqueNodes = new Set(rawData.flatMap(item => [item.node_id, item.child_id]));
    const uniqueLines = new Set(rawData.map(item => item.line_id).filter(id => id !== null));
    const maxLevel = Math.max(...rawData.map(item => item.level), 0);
    
    document.getElementById('nodeCount').textContent = uniqueNodes.size;
    document.getElementById('lineCount').textContent = uniqueLines.size;
    document.getElementById('maxLevel').textContent = maxLevel;
    document.getElementById('edgeCount').textContent = edgesData ? edgesData.length : 0;
}

function updateNetworkOptions() {
    if (network && nodesData && edgesData) {
        const showLabels = document.getElementById('showLabels').checked;
        const usePhysics = document.getElementById('showPhysics').checked;
        
        // Обновляем метки
        nodesData.forEach(node => {
            if (showLabels) {
                node.label = `Node ${node.id.split('-')[1]}`;
            } else {
                node.label = '';
            }
        });
        
        // Обновляем физику
        if (network.physics) {
            network.setOptions({ physics: { enabled: usePhysics } });
        }
        
        network.redraw();
    }
}

function generateColorPalette(count) {
    const colors = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7DC6F', '#BB8FCE', '#85C1E2', '#F8B88B', '#A8E6CF'
    ];
    return colors.slice(0, count);
}

function exportNetwork() {
    if (rawData.length === 0) {
        alert('Сначала загрузите сеть');
        return;
    }
    
    const csv = convertToCSV(rawData);
    downloadCSV(csv, 'network_export.csv');
}

function convertToCSV(data) {
    if (data.length === 0) return '';
    
    const headers = Object.keys(data[0]);
    const rows = [headers.join(',')];
    
    data.forEach(item => {
        const values = headers.map(header => {
            let value = item[header];
            if (value === null || value === undefined) value = '';
            if (typeof value === 'string') value = `"${value.replace(/"/g, '""')}"`;
            return value;
        });
        rows.push(values.join(','));
    });
    
    return rows.join('\n');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', filename);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
