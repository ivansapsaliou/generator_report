{# Toolbar actions for SQL Editor — included in {% block topbar_actions %} #}
<span id="editorConnectionBadge" style="display:none;font-size:10px;font-family:var(--font-mono);color:var(--text-3);padding:2px 8px;background:var(--bg-3);border:1px solid var(--line);border-radius:3px;"></span>
<button class="btn btn-secondary btn-sm" onclick="formatSQL()" title="Форматировать SQL (Ctrl+K)"><i class="bi bi-text-indent-left"></i></button>
<button class="btn btn-secondary btn-sm" onclick="showSnippetsModal()" title="Сниппеты"><i class="bi bi-collection"></i></button>
